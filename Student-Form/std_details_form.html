<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Details Form</title>
</head>
<body style="background-color: lightyellow;">
    <fieldset>
        <legend><strong>Student Details</strong></legend>
        <fieldset>
            <legend><strong>Personal</strong></legend>
            <table>
            <tr><td><label for=""><strong>First Name: </strong></label></td><td><input type="text" name="" id="" placeholder="First Name"  required></td></tr>
            <tr><td><label for=""><strong>Last Name: </strong></label></td><td><input type="text" name="" id="" placeholder="Last Name"  required></td></tr>
            <tr><td><label for=""><strong>Father's Name:</strong>  </label></td><td><input type="text" name="" id="" placeholder="Father's Name"  required></tr></td>
            <tr><td><label for=""><strong>Mother's Name:</strong>  </label></td><td><input type="text" name="" id="" placeholder="Mother's Name"  required></td></tr>
            <tr><td><label for=""><strong>DOB: </strong></label></td><td><input type="date" name="" id=""  required></td></tr>
            <tr><td><label for=""><strong>Gender:</strong></label></td>
            <td><input type="radio" name="" id=""><label for=""><strong>Male</strong></label>
            <input type="radio" name="" id=""><label for=""><strong>Female</strong></label>
            <input type="radio" name="" id=""><label for=""><strong>Others</strong></label></td></tr>
            <tr><td><label forstrong><strong>Blood group:</strong></label></td>
            <td><select>
                <option hidden>--Choose--</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>O+</option>
                <option>O-</option>
            </select></td></tr>
            </table>
        </fieldset> 
        <fieldset>
            <legend><strong><strong>Contant</strong></strong></legend>
            <table>
                <tr><td><label><strong>Mobile Number:</strong></label></td><td><input type="number" name="" id="" placeholder="10 digits"></td></tr>
                <tr><td><label><strong>Mail id:</strong></label></td><td><input type="email" name="" id="" placeholder="sample@gmail.com"></td></tr>
                <tr><td><label><strong>Address:</strong></label></td><td><input type="text" name="" id="" placeholder="House no,Street Name"></td></tr>
                <tr><td><input type="text" name="" id="" placeholder="Line 1" ></td><td><input type="text" name="" id="" placeholder="Line 2"></td></tr>
                <tr><td><label><strong>Country:</strong> </label></td>
                <td><select>
                <option hidden>--Choose--</option>
                <option>Argentina</option>
                <option>Australia</option>
                <option>Bangladesh</option>
                <option>Brazil</option>
                <option>Canada</option>
                <option>Denmark</option>
                <option>Egypt</option>
                <option>France</option>
                <option>Germany</option>
                <option>India</option>
            </select></td></tr>
            <tr><td><label><strong>State:</strong> </label></td>
            <td><select>
                <option hidden>--Choose--</option>
                <option>Andhra Pradesh</option>
                <option>Assam</option>
                <option>Bihar</option>
                <option>Goa</option>
                <option>Gujarat</option>
                <option>Karnataka</option>
                <option>Kerala</option>
                <option>Maharashtra</option>
                <option>Punjab</option>
                <option>Tamil Nadu</option>
            </select></td></tr>
            <tr><td><label><strong>Pin Code: </strong></label></td><td><input type="number" name="" id="" placeholder="6 digits"></td></tr>
            </table>
        </fieldset> 
        <fieldset>
            <legend><strong>Education: </strong></legend>
            <table>
                <tr><td><label for=""><strong>Hightest Degree:</strong></label></td>
                <td><select>
                    <option hidden>--Choose--</option>
                    <option>B.Arch (Bachelor of Architecture)</option>
                    <option>BBA (Bachelor of Business Administration)</option>
                    <option>BCA (Bachelor of Computer Applications)</option>
                    <option>BDS (Bachelor of Dental Surgery)</option>
                    <option>B.Ed (Bachelor of Education)</option>
                    <option>B.Ed (Bachelor of Education)</option>
                    <option>BE/B.Tech (Bachelor of Engineering / Technology)</option>
                    <option>LLB (Bachelor of Law)</option>
                    <option>MBBS (Bachelor of Medicine & Surgery)</option>
                    <option>MBA (Master of Business Administration)</option>
                </select></td></tr>
                <tr><td><label for=""><strong>Stream:</strong></label></td>
                <td><input type="radio"><label for=""><strong>Mech</strong></label>
                <input type="radio"><label for=""><strong>Civil</strong></label>
                <input type="radio"><label for=""><strong>CS</strong></label>
                <input type="radio"><label for=""><strong>ECE</strong></label>
                <input type="radio"><label for=""><strong>IT</strong></label>
                <input type="radio"><label for=""><strong>EEE</strong></label></td></tr>
                <tr><td><label for=""><strong>If Other:</strong></label></td><td><input type="text"></td></tr>
                <tr><td><label><strong>YOP</strong></label></td>
                <td><select>
                    <option hidden>--choose--</option>
                    <option>2025</option>
                    <option>2024</option>
                    <option>2023</option>
                    <option>2022</option>
                    <option>2021</option>
                </select></td></tr>
                <tr><td><label for=""><strong>University:</strong></label></td><td><input type="text"></td></tr>
                <tr><td><label for=""><strong>Percentage:</strong></label></td><td><input type="text"></td></tr>
            </table>
        </fieldset> 
        <fieldset>
            <legend><strong>Placement</strong></legend>
            <table>
                <tr><td><label><strong>Skills:</strong></label></td></tr>
                <tr><td><input type="checkbox"><label><strong>HTML</strong></label>
                <input type="checkbox"><label><strong>CSS</strong></label>
                <input type="checkbox"><label><strong>Javascript</strong></label>
                <input type="checkbox"><label><strong>C++</strong></label>
                <input type="checkbox"><label><strong>Python</strong></label></td></tr>
                <tr><td><input type="checkbox"><label><strong>Java</strong></label>
                <input type="checkbox"><label><strong>Pandas</strong></label>
                <input type="checkbox"><label><strong>Numpy</strong></label></td></tr>
                <tr><td><input type="checkbox"><label><strong>Tenserflow</strong></label>
                <input type="checkbox"><label><strong>React</strong></label>
                <input type="checkbox"><label><strong>Django</strong></label></td></tr>
            <tr><td><label><strong>Domain:</strong></label></td></tr>
            <tr><td><input type="radio"><label><strong>Dev</strong></label>
            <input type="radio"><label><strong>Tester</strong></label>
            <input type="radio"><label><strong>Devops</strong></label>
            <input type="radio"><label><strong>Data Analyst</strong></label>
            <input type="radio"><label><strong>Support</strong></label></td></tr>
            <tr><td><label><strong>Place of Preference: </strong></label></td></tr>
            <tr><td><input type="radio"><label><strong>Banglore</strong></label>
            <input type="radio"><label><strong>Chennai</strong></label>
            <input type="radio"><label><strong>Dehli</strong></label>
            <input type="radio"><label><strong>Noida</strong></label>
            <input type="radio"><label><strong>Hydrabad</strong></label>
            <input type="radio"><label><strong>Pune</strong></label>
            <input type="radio"><label><strong>Pan India</strong></label></td></tr>
            <tr><td><label><strong>Expecting Salary: </strong></label></td></tr>
            <tr><td><input type="radio"><label><strong>Less than 3LPA</strong></label>
            <input type="radio"><label><strong>3.6LPA</strong></label>
            <input type="radio"><label><strong>6-10LPA</strong></label>
            <input type="radio"><label><strong>More than 10 LPA</strong></label>
            <input type="radio"><label><strong>No Expectation</strong></label></td></tr>
            </table>
            </fieldset>
            <fieldset>
                <legend><strong>Create Account</strong></legend>
                <table>
                    <tr><td><label><strong>UseraName:</strong></label></td><td><input type="text" placeholder="UserName"></td></tr>
                    <tr><td><label><strong>Password:</strong></label></td><td><input type="text"></td></tr>
                    <tr><td><label><strong>Re-Enter:</strong></label></td><td><input type="text"></td></tr>
                </table>    
            </fieldset>
                <table>
                    <tr><td><input type="checkbox"><label><strong>Agree Terms & Condition</strong></label></td></tr>
                    <tr><td><input type="submit">
                    <input type="reset"></td></tr>
                </table>
    </fieldset>
</body>
</html>
